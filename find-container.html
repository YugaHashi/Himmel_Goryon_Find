<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }
    iframe {
      display: block;
      margin: 0 auto 12px;
      border: none;
    }
  </style>
</head>
<body>
  <!-- 検索 -->
  <iframe id="search-frame"
    src="https://yugahashi.github.io/Himmel_Goryon_Find/search/index-search.html"
    width="360"
    height="500"
    scrolling="no">
  </iframe>

  <!-- 一覧 -->
  <iframe id="list-frame"
    src="https://yugahashi.github.io/Himmel_Goryon_Find/list/index-list.html"
    width="360"
    height="300"
    scrolling="yes">
  </iframe>

  <!-- コメント＆開放 -->
  <iframe id="comment-frame"
    src="https://yugahashi.github.io/Himmel_Goryon_Find/comment/index-comment.html"
    width="360"
    height="750"
    scrolling="yes">
  </iframe>

  <!-- postMessage 中継 -->
  <script>
    window.addEventListener("message", (e) => {
      if (e.data?.type === "showMenu") {
        const searchFrame = document.getElementById("search-frame");
        searchFrame?.contentWindow?.postMessage({
          type: "showMenu",
          id: e.data.id,
          name: e.data.name
        }, "*");
      }
    });
  </script>
</body>
</html>
