<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メニュー検索</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: transparent;
      color: #222;
      font-size: 14px;
      padding: 10px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    .result {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.8);
    }
    .menu-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .menu-item {
      background: #f5f5f5;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <input type="text" id="searchInput" placeholder="メニュー名を入力してください" />
  <div id="result" class="result" style="display:none;"></div>
  <div class="menu-list" id="menuList"></div>

  <script>
    const resultBox = document.getElementById("result");
    const searchInput = document.getElementById("searchInput");
    const menuList = document.getElementById("menuList");

    async function fetchMenus() {
      const res = await fetch('/api/search?q=');
      const data = await res.json();
      data.forEach(menu => {
        const div = document.createElement("div");
        div.className = "menu-item";
        div.textContent = menu.name_jp;
        div.onclick = () => {
          searchInput.value = menu.name_jp;
          displayResult(menu);
        };
        menuList.appendChild(div);
      });
    }

    function displayResult(menu) {
      resultBox.innerHTML = `
        <img src="${menu.image_url}" alt="${menu.name_jp}" style="max-width:100%; border-radius:8px;" />
        <strong>${menu.name_jp}</strong><br/>
        <em>${menu.name_en}</em><br/>
        <p>${menu.description_jp}</p>
        <p><em>${menu.description_en}</em></p>
      `;
      resultBox.style.display = "block";
    }

    searchInput.addEventListener("input", async () => {
      const query = searchInput.value.toLowerCase();
      if (!query) {
        resultBox.style.display = "none";
        return;
      }
      const res = await fetch(`/api/search?q=${query}`);
      const data = await res.json();
      if (data.length > 0) {
        displayResult(data[0]);
      } else {
        resultBox.innerHTML = `<p>一致するメニューが見つかりませんでした。</p>`;
        resultBox.style.display = "block";
      }
    });

    fetchMenus();
  </script>
</body>
</html>
