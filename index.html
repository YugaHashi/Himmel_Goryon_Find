<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>南平台ごりょんさん メニュー一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>南平台ごりょんさん メニュー一覧</h1>
    <p class="intro">ようこそ！こちらでは、料理の写真や説明を含めてメニューを一覧・検索できます。</p>

    <input type="text" id="search-input" placeholder="メニュー名を入力（例：レタス巻き）" list="menu-suggestions" />
    <datalist id="menu-suggestions"></datalist>
    <button id="search-btn">検索</button>

    <div id="results" class="results-container"></div>
  </div>
  <script type="module" src="clients.js"></script>
</body>
</html>
