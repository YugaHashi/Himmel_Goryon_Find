<!-- comment/index-comment.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="stylesheet" href="style-comment.css"/>
  <title>口コミ & 南平台ごりょんさん Lv</title>
</head>
<body>
  <div class="container">
    <div id="level-ui">
      <label>ごりょんレベル</label>
      <progress id="progress" max="3" value="0"></progress>
      <span id="level-label">Lv 0</span>
    </div>
    <form id="comment-form">
      <select id="form-menu">
        <option value="">メニューを選択</option>
      </select>
      <input id="nickname" placeholder="ニックネーム（任意）"/>
      <select id="age-group">
        <option value="">年代（任意）</option>
        <option>10代</option><option>20代</option><option>30代</option>
        <option>40代</option><option>50代</option><option>60代以上</option>
      </select>
      <select id="gender">
        <option value="">性別（任意）</option>
        <option>男性</option><option>女性</option><option>その他</option>
      </select>
      <textarea id="comment" rows="3" placeholder="ご意見・ご要望を記入…"></textarea>
      <input type="file" id="image_user" accept=".jpg,.jpeg,.png,.webp"/>
      <label><input type="checkbox" id="vote-checkbox"/> おすすめに1票</label>
      <button type="submit">共有する</button>
    </form>

<div id="features" class="button-group">
  <button id="btn-jsuggestion" disabled>
    AIおすすめ<br>（1回の共有で利用可）
  </button>
  <button id="btn-jquiz" disabled>
    豆知識クイズ<br>（2回の共有で利用可）
  </button>
  <button id="btn-jar" disabled>
    AR体験<br>（3回の共有で利用可）
  </button>
</div>

    <script type="module" src="comment.js"></script>
  </div>
</body>
</html> <!-- comment/index-comment.html -->
