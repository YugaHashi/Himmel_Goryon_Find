<!-- search/index-search.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="stylesheet" href="style-search.css"/>
  <title>〜メニュー検索〜</title>
</head>
<body>
  <div class="container">
    <h1>〜メニュー検索〜</h1>
    <div class="search-bar">
      <input id="search-input" list="menu-suggestions" placeholder="メニュー名を入力…" autocomplete="off"/>
      <button id="search-btn">検索</button>
    </div>
    <datalist id="menu-suggestions"></datalist>
    <section id="results" class="results">
      <img
        id="placeholder"
        src="https://yugahashi.github.io/Himmel_Goryon_Find/assets/result.png"
        alt="検索前"
        width="285"
        class="placeholder"
      />
    </section>
  </div>
  <script type="module" src="search.js"></script>
</body>
</html>
